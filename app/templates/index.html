<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InkHub — Painel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f13;
      --surface:  #16161f;
      --surface2: #1a1a24;
      --border:   #2a2a3a;
      --purple:   #7c3aed;
      --purple-d: #6d28d9;
      --purple-l: #a78bfa;
      --purple-x: #4c1d95;
      --purple-bg:#1e1030;
      --text:     #e2e2e2;
      --muted:    #9ca3af;
      --dim:      #6b7280;
      --ok:       #4ade80;
      --err:      #f87171;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Topo ── */
    .topo {
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      height: 56px;
      background: var(--surface2);
      border-bottom: 2px solid var(--purple);
      flex-shrink: 0;
      gap: 1rem;
    }
    .logo { font-size: 1.3rem; font-weight: 800; color: #fff; letter-spacing: -.02em; }
    .logo span { color: var(--purple); }
    .topo-sub { font-size: .9rem; color: var(--dim); font-weight: 400; }
    .topo-direita { margin-left: auto; display: flex; align-items: center; gap: .75rem; }


    .btn-link {
      font-size: .82rem;
      color: var(--dim);
      text-decoration: none;
      padding: .3rem .7rem;
      border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .btn-link:hover { color: var(--purple-l); background: var(--purple-bg); }

    .btn-logout {
      font-size: .82rem;
      color: var(--purple-l);
      text-decoration: none;
      border: 1px solid var(--purple-x);
      border-radius: 6px;
      padding: .3rem .75rem;
      transition: background .15s;
    }
    .btn-logout:hover { background: var(--purple-x); color: #fff; }

    /* ── Conteúdo das seções ── */
    .secao-conteudo { display: none; flex: 1; }
    .secao-conteudo.ativa { display: flex; }

    .secao-obras { display: flex; }
    .secao-capitulos { display: none; }

    /* ── Layout duas colunas (formulário + tabela) ── */
    .dois-col {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }

    /* Formulário */
    .col-form {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      overflow-y: auto;
    }
    .col-form h2 { font-size: 1rem; color: var(--purple-l); margin-bottom: 1.2rem; }

    .campo { margin-bottom: 1rem; }
    .campo label {
      display: block;
      font-size: .8rem;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: .35rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .campo input, .campo select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: .55rem .8rem;
      font-size: .9rem;
      transition: border-color .15s;
    }
    .campo input:focus, .campo select:focus { outline: none; border-color: var(--purple); }
    .campo select option { background: var(--surface2); }

    .btn-cadastrar {
      width: 100%;
      background: var(--purple);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: .95rem;
      font-weight: 700;
      padding: .65rem;
      cursor: pointer;
      margin-top: .5rem;
      transition: background .15s;
    }
    .btn-cadastrar:hover { background: var(--purple-d); }

    .msg-form {
      margin-top: .75rem;
      font-size: .83rem;
      min-height: 1.2em;
      text-align: center;
    }
    .msg-ok  { color: var(--ok); }
    .msg-err { color: var(--err); }

    /* Tabela */
    .col-tabela {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1.5rem;
      gap: 1rem;
    }
    .tabela-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tabela-header h2 { font-size: 1rem; color: var(--text); }

    .btn-reload {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      border-radius: 6px;
      padding: .3rem .75rem;
      font-size: .82rem;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-reload:hover { border-color: var(--purple); color: var(--purple-l); }

    .tabela-wrap { flex: 1; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    thead th {
      text-align: left;
      padding: .55rem .85rem;
      background: var(--surface);
      color: var(--muted);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody td {
      padding: .6rem .85rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody tr:hover td { background: var(--surface); }
    .status-tabela { font-size: .85rem; color: var(--dim); }

    /* ── Aba Upload PDF (Cloudinary) ── */
    .upload-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      flex: 1;
      overflow: hidden;
    }

    .upload-form {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }
    .upload-form h2 { font-size: 1rem; color: var(--purple-l); }

    /* drop zone */
    .drop-zone {
      border: 2px dashed var(--purple-x);
      border-radius: 12px;
      padding: 1.75rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .drop-zone:hover, .drop-zone.over { background: var(--purple-bg); border-color: var(--purple); }

    .drop-zone .drop-icon { font-size: 2rem; margin-bottom: .5rem; }
    .drop-zone p   { font-size: .88rem; color: var(--muted); }
    .drop-zone small { font-size: .78rem; color: var(--dim); }
    .drop-zone input { display: none; }

    #nome-arquivo {
      font-size: .82rem;
      color: var(--purple-l);
      background: rgba(124,58,237,.1);
      border-radius: 6px;
      padding: .4rem .75rem;
      display: none;
      word-break: break-all;
    }

    .btn-upload {
      background: var(--purple);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: .95rem;
      font-weight: 700;
      padding: .65rem;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-upload:hover:not(:disabled) { background: var(--purple-d); }
    .btn-upload:disabled { opacity: .45; cursor: not-allowed; }

    .progress-bar-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: var(--purple);
      width: 0%;
      transition: width .3s;
      border-radius: 99px;
    }

    .msg-upload { font-size: .83rem; min-height: 1.2em; }
    .msg-upload.ok  { color: var(--ok); }
    .msg-upload.err { color: var(--err); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<!-- Topo -->
<header class="topo">
  <div class="logo">Ink<span>Hub</span></div>
  <span class="topo-sub">/ Painel admin</span>
  <div class="topo-direita">
    <span class="topo-usuario">Olá, <strong>{{ usuario_nome }}</strong></span>
    <a href="/" class="btn-link">Ver catálogo</a>
    <a href="/logout" class="btn-logout">Sair</a>
  </div>
</header>


<!-- ══════════ SEÇÃO OBRAS ══════════ -->
<div class="secao-conteudo secao-obras" id="secao-obras">
  <div class="dois-col">
    <div class="col-form">
      <h2>Nova obra</h2>
      <div class="campo">
        <label>Título *</label>
        <input id="o-titulo" type="text" placeholder="Título da obra" />
      </div>
      <div class="campo">
        <label>Categoria</label>
        <input id="o-categoria" type="text" placeholder="Shonen, Seinen…" />
      </div>
      <div class="campo">
        <label>Ano</label>
        <input id="o-ano" type="number" placeholder="2024" />
      </div>
      <button class="btn-cadastrar" id="btn-obra">Cadastrar obra</button>
      <div class="msg-form" id="msg-obra"></div>
      <button class="btn-cadastrar" id="btn-ir-capitulos" style="display:none; background: var(--purple-d); margin-top: 1rem; padding: .85rem; font-size: 1rem;">Novo capítulo →</button>
    </div>
    <div class="col-tabela">
      <div class="tabela-header">
        <h2>Obras cadastradas</h2>
        <button class="btn-reload" data-reload="obras">↺ Recarregar</button>
      </div>
      <div class="status-tabela" id="status-obras"></div>
      <div class="tabela-wrap">
        <table>
          <thead><tr><th>#</th><th>Título</th></tr></thead>
          <tbody id="tbody-obras"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ SEÇÃO CAPÍTULOS ══════════ -->
<div class="secao-conteudo secao-capitulos" id="secao-capitulos">
  <div class="dois-col">
    <div class="col-form">
      <button class="btn-cadastrar" id="btn-voltar-obras" style="background: var(--purple-d); margin-bottom: 1rem;">← Voltar para obras</button>
      <h2>Novo capítulo</h2>
      <div class="campo">
        <label>Obra *</label>
        <select id="c-obra">
          <option value="">— Selecione a obra —</option>
        </select>
      </div>
      <div class="campo">
        <label>Título *</label>
        <input id="c-titulo" type="text" placeholder="Título do capítulo" />
      </div>
      <button class="btn-cadastrar" id="btn-capitulo" disabled>Cadastrar capítulo</button>
      <div class="msg-form" id="msg-capitulo"></div>

      <hr style="border: 0; border-top: 1px solid var(--border); margin: 1.5rem 0;" />

      <h2>Enviar PDF</h2>
      <div class="drop-zone" id="drop-zone">
        <div class="drop-icon">📄</div>
        <p>Arraste o PDF aqui</p>
        <small>ou clique para selecionar</small>
        <input type="file" id="input-pdf" accept="application/pdf" />
      </div>

      <div id="nome-arquivo"></div>

      <div class="campo">
        <label>Obra *</label>
        <select id="pdf-obra">
          <option value="">— Selecione a obra —</option>
        </select>
      </div>

      <div class="campo">
        <label>Capítulo</label>
        <select id="pdf-capitulo">
          <option value="">— Selecione o capítulo (opcional) —</option>
        </select>
      </div>

      <div class="progress-bar-wrap" id="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>

      <button class="btn-upload" id="btn-upload" disabled>
        ☁ Enviar para a nuvem
      </button>

      <div class="msg-upload" id="msg-upload"></div>
    </div>
    <div class="col-tabela">
      <div class="tabela-header">
        <h2>Capítulos cadastrados</h2>
        <button class="btn-reload" data-reload="capitulos">↺ Recarregar</button>
      </div>
      <div class="status-tabela" id="status-capitulos"></div>
      <div class="tabela-wrap">
        <table>
          <thead><tr><th>Número</th><th>Título</th><th>Obra</th></tr></thead>
          <tbody id="tbody-capitulos"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   Utilitários
══════════════════════════════════════════════ */
const $  = id  => document.getElementById(id);
const $$ = sel => document.querySelectorAll(sel);
const api = path => fetch(path).then(r => r.json());

function setMsg(elId, texto, tipo) {
  const el = $(elId);
  if (!el) {
    console.error("Elemento não encontrado:", elId);
    return;
  }
  el.textContent  = texto;
  el.className    = "msg-form " + (tipo === "ok" ? "msg-ok" : tipo === "err" ? "msg-err" : "");
  el.style.display = "block";
}

/* ══════════════════════════════════════════════
   Navegação entre seções
══════════════════════════════════════════════ */
$("btn-ir-capitulos").addEventListener("click", () => {
  $("secao-obras").style.display = "none";
  $("secao-capitulos").style.display = "flex";
});

$("btn-voltar-obras").addEventListener("click", () => {
  $("secao-capitulos").style.display = "none";
  $("secao-obras").style.display = "flex";
});

/* ══════════════════════════════════════════════
   Dados em memória
══════════════════════════════════════════════ */
let obras = [], capitulos = [];

/* ══════════════════════════════════════════════
   Selects
══════════════════════════════════════════════ */
function popularSelects() {
  // O autor é o usuário autenticado (mostrado como texto no formulário)

  // Obra (select de capítulos)
  const selObraC = $("c-obra");
  const curObraC = selObraC.value;
  selObraC.innerHTML = '<option value="">— Selecione a obra —</option>';
  obras.forEach(o => {
    const opt = document.createElement("option");
    opt.value = o.id; opt.textContent = o.titulo;
    selObraC.appendChild(opt);
  });
  selObraC.value = curObraC;

  // Obra (select de PDFs)
  const selObraP = $("pdf-obra");
  const curObraP = selObraP.value;
  selObraP.innerHTML = '<option value="">— Selecione a obra —</option>';
  obras.forEach(o => {
    const opt = document.createElement("option");
    opt.value = o.id; opt.textContent = o.titulo;
    selObraP.appendChild(opt);
  });
  selObraP.value = curObraP;
  atualizarCapitulosPdf();
  atualizarBtnUpload();
}

function atualizarCapitulosPdf() {
  const obraId = $("pdf-obra").value;
  const selCap = $("pdf-capitulo");
  const curCap = selCap.value;
  selCap.innerHTML = '<option value="">— Selecione o capítulo (opcional) —</option>';

  if (obraId) {
    const capsObra = capitulos.filter(c => c.obra_id == obraId).sort((a, b) => a.numero - b.numero);
    capsObra.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.id;
      opt.textContent = `Cap. ${c.numero} - ${c.titulo}`;
      selCap.appendChild(opt);
    });
  }
  selCap.value = curCap;
}

/* ══════════════════════════════════════════════
   Render tabelas
══════════════════════════════════════════════ */

function renderObras() {
  const tb = $("tbody-obras");
  $("status-obras").textContent = obras.length ? "" : "Nenhuma obra cadastrada.";
  tb.innerHTML = obras.map(o => `
    <tr><td>${o.id}</td><td>${o.titulo}</td></tr>
  `).join("");
}

function renderCapitulos() {
  const mapaObras = Object.fromEntries(obras.map(o => [o.id, o.titulo]));
  const tb = $("tbody-capitulos");
  $("status-capitulos").textContent = capitulos.length ? "" : "Nenhum capítulo cadastrado.";
  tb.innerHTML = capitulos
    .sort((a, b) => (a.obra_id - b.obra_id) || (a.numero || 0) - (b.numero || 0))
    .map(c => `
      <tr>
        <td>${c.numero ?? "—"}</td>
        <td>${c.titulo}</td>
        <td>${mapaObras[c.obra_id] || c.obra_id}</td>
      </tr>
    `).join("");
}

/* ══════════════════════════════════════════════




/* ══════════════════════════════════════════════
   Recarregar individualmente
══════════════════════════════════════════════ */
$$("[data-reload]").forEach(btn => {
  btn.addEventListener("click", async () => {
    switch (btn.dataset.reload) {
      case "obras":
        obras = await api("/api/minhas_obras");
        renderObras(); popularSelects(); break;
      case "capitulos":
        capitulos = await api("/api/meus_capitulos");
        renderCapitulos(); break;
    }
  });
});

/* ══════════════════════════════════════════════
   Cadastrar obra
══════════════════════════════════════════════ */
$("btn-obra").addEventListener("click", async () => {
  const titulo = $("o-titulo").value.trim();
  const categoria = $("o-categoria").value.trim();
  const ano = $("o-ano").value.trim();

  if (!titulo) {
    setMsg("msg-obra", "✗ O campo Título é obrigatório.", "err");
    return;
  }
  if (!categoria) {
    setMsg("msg-obra", "✗ O campo Categoria é obrigatório.", "err");
    return;
  }
  if (!ano) {
    setMsg("msg-obra", "✗ O campo Ano é obrigatório.", "err");
    return;
  }

  const dados = {
    titulo_obra: titulo,
    categoria:   categoria,
    ano:         ano,
  };
  try {
    const r = await fetch("/api/obras", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(dados),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.erro || "Erro");
    setMsg("msg-obra", "✓ Obra cadastrada!", "ok");
    $("o-titulo").value = $("o-categoria").value = $("o-ano").value = "";
    obras = await api("/api/minhas_obras");
    renderObras(); popularSelects();
    if (obras.length > 0) {
      $("btn-ir-capitulos").style.display = "block";
    }
  } catch (e) { setMsg("msg-obra", "✗ " + e.message, "err"); }
});

/* ══════════════════════════════════════════════
   Cadastrar capítulo
══════════════════════════════════════════════ */
$("btn-capitulo").addEventListener("click", async () => {
  const obra = $("c-obra").value;
  const titulo = $("c-titulo").value.trim();

  if (!obra) {
    setMsg("msg-capitulo", "✗ O campo Obra é obrigatório.", "err");
    return;
  }
  if (!titulo) {
    setMsg("msg-capitulo", "✗ O campo Título é obrigatório.", "err");
    return;
  }

  const dados = {
    titulo_capitulo: titulo,
    obra_id:         obra,
  };
  try {
    const r = await fetch("/api/capitulos", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(dados),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.erro || "Erro");
    setMsg("msg-capitulo", "✓ Capítulo cadastrado!", "ok");
    $("c-titulo").value = "";
    capitulos = await api("/api/meus_capitulos");
    renderCapitulos();
  } catch (e) { setMsg("msg-capitulo", "✗ " + e.message, "err"); }
});

/* ══════════════════════════════════════════════
   Upload PDF → Cloudinary
══════════════════════════════════════════════ */
let arquivoPdf = null;

const dropZone = $("drop-zone");
const inputPdf = $("input-pdf");

dropZone.addEventListener("click", () => inputPdf.click());
dropZone.addEventListener("dragover",  e => { e.preventDefault(); dropZone.classList.add("over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("over"));
dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("over");
  const f = e.dataTransfer.files[0];
  if (f?.type === "application/pdf") definirArquivo(f);
  else mostrarMsgUpload("Apenas arquivos PDF são aceitos.", "err");
});
inputPdf.addEventListener("change", () => {
  if (inputPdf.files[0]) definirArquivo(inputPdf.files[0]);
});
$("pdf-obra").addEventListener("change", () => {
  atualizarCapitulosPdf();
  atualizarBtnUpload();
});

function definirArquivo(f) {
  arquivoPdf = f;
  const nomeEl = $("nome-arquivo");
  nomeEl.textContent = "📎 " + f.name;
  nomeEl.style.display = "block";
  atualizarBtnUpload();
  $("btn-capitulo").disabled = false;
  mostrarMsgUpload("", "");
}

function atualizarBtnUpload() {
  $("btn-upload").disabled = !(arquivoPdf && $("pdf-obra").value);
}

function mostrarMsgUpload(texto, tipo) {
  const el = $("msg-upload");
  el.textContent = texto;
  el.className   = "msg-upload " + (tipo === "ok" ? "ok" : tipo === "err" ? "err" : "");
}

$("btn-upload").addEventListener("click", async () => {
  if (!arquivoPdf || !$("pdf-obra").value) return;

  $("btn-upload").disabled = true;
  mostrarMsgUpload("Enviando para o Cloudinary…", "");

  // Barra de progresso simulada (o fetch não expõe progresso de upload facilmente)
  const wrap = $("progress-wrap");
  const bar  = $("progress-bar");
  wrap.style.display = "block";
  bar.style.width = "0%";
  const tick = setInterval(() => {
    const atual = parseFloat(bar.style.width);
    if (atual < 85) bar.style.width = (atual + 3) + "%";
  }, 200);

  try {
    const fd = new FormData();
    fd.append("arquivo", arquivoPdf);
    fd.append("obra_id", $("pdf-obra").value);
    if ($("pdf-capitulo").value) {
      fd.append("capitulo_id", $("pdf-capitulo").value);
    }

    const r = await fetch("/api/upload_pdf", { method: "POST", body: fd });
    const d = await r.json();

    clearInterval(tick);
    bar.style.width = "100%";
    setTimeout(() => { wrap.style.display = "none"; bar.style.width = "0%"; }, 600);

    if (!r.ok) throw new Error(d.erro || "Erro no upload");

    mostrarMsgUpload("✓ PDF enviado e URL salva no banco!", "ok");

    // limpar
    arquivoPdf = null;
    $("nome-arquivo").style.display = "none";
    $("nome-arquivo").textContent   = "";
    inputPdf.value = "";
    atualizarBtnUpload();
    $("btn-capitulo").disabled = true;

  } catch (e) {
    clearInterval(tick);
    wrap.style.display = "none";
    mostrarMsgUpload("✗ " + e.message, "err");
    $("btn-upload").disabled = false;
  }
});

async function carregarTodos() {
  [obras, capitulos] = await Promise.all([
    api("/api/minhas_obras"),
    api("/api/meus_capitulos"),
  ]);
  renderObras();
  renderCapitulos();
  popularSelects();
  if (obras.length > 0) {
    $("btn-ir-capitulos").style.display = "block";
  }
}
carregarTodos();
</script>
